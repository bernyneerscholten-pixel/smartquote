<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartQuote Telecom Assistent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-100 p-4">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold">SmartQuote Assistent</h1>
            <button onclick="document.getElementById('settings').classList.toggle('hidden')" class="bg-slate-200 px-3 py-1 rounded">Instellingen</button>
        </div>

        <div id="settings" class="hidden mb-6 p-4 bg-slate-50 rounded-lg">
            <input type="password" id="apiKey" placeholder="Plak hier je Gemini API Sleutel" class="w-full p-2 border rounded">
            <button onclick="saveSettings()" class="mt-2 bg-blue-600 text-white px-4 py-2 rounded">Opslaan</button>
        </div>

        <textarea id="query" class="w-full p-3 border rounded mb-4" placeholder="Bijv: iPhone 15 Pro 128GB"></textarea>
        <button onclick="search()" id="searchBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">Zoek op Coolblue</button>

        <div id="result" class="mt-6"></div>
    </div>

    <script>
        // Laad sleutel
        document.getElementById('apiKey').value = localStorage.getItem('gemini_key') || '';

        function saveSettings() {
            localStorage.setItem('gemini_key', document.getElementById('apiKey').value);
            alert('Opgeslagen');
        }

        async function search() {
            const key = localStorage.getItem('gemini_key');
            if (!key) { alert('Vul eerst je API sleutel in bij instellingen!'); return; }
            
            const q = document.getElementById('query').value;
            const resDiv = document.getElementById('result');
            resDiv.innerHTML = "Zoeken...";

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Zoek op Coolblue naar ${q}. Output format: JSON array: [ { "model": "...", "price": 0, "url": "..." } ]` }] }],
                        tools: [{ googleSearch: {} }]
                    })
                });

                const data = await response.json();
                
                // Veiligheidscheck
                if (!data.candidates || !data.candidates[0].content.parts[0].text) {
                    throw new Error("Geen geldig antwoord van AI");
                }

                const jsonText = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
                const items = JSON.parse(jsonText);
                
                resDiv.innerHTML = items.map(item => `
                    <div class="border p-4 mb-2 rounded">
                        <p class="font-bold">${item.model}</p>
                        <p>€${item.price}</p>
                        <a href="${item.url}" target="_blank" class="text-blue-500">Bekijk op Coolblue</a>
                    </div>
                `).join('');

            } catch (err) {
                resDiv.innerHTML = "Fout: " + err.message;
            }
        }
    </script>
</body>
</html>
