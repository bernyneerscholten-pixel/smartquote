<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartQuote Telecom Assistent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 text-white p-2.5 rounded-xl shadow-md"><i class="fa-solid fa-calculator text-xl"></i></div>
                <div>
                    <h1 class="text-xl font-bold text-slate-900 tracking-tight">SmartQuote</h1>
                    <p class="text-xs text-slate-500 font-medium">Telecom Sales Assistent</p>
                </div>
            </div>
            <button onclick="toggleSettingsModal()" class="text-slate-500 hover:text-slate-800 p-2 rounded-lg hover:bg-slate-100"><i class="fa-solid fa-cog text-lg"></i></button>
        </div>
    </header>

    <div id="settingsModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center hidden">
        <div class="bg-white rounded-2xl max-w-md w-full mx-4 p-6 shadow-2xl">
            <h3 class="text-lg font-bold mb-4">Instellingen</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Gemini API Sleutel</label>
                    <input type="password" id="customApiKeyInput" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm">
                </div>
                <button onclick="saveSettings()" class="w-full bg-blue-600 text-white font-semibold py-2 rounded-lg text-sm">Opslaan</button>
            </div>
        </div>
    </div>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 py-8 flex flex-col lg:flex-row gap-8">
        <div class="w-full lg:w-5/12 flex flex-col gap-6">
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                <h2 class="font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-mobile-screen text-blue-600"></i> 1. Smartphone Modellen</h2>
                <textarea id="smartphoneSearchQuery" rows="3" class="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm mb-4" placeholder="Bijv: iPhone 17 Pro 512GB"></textarea>
                <button id="searchButton" onclick="performLiveSearch()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl shadow-md transition-all">Zoek Live Prijzen</button>
            </div>
            <div id="verificationContainer" class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hidden">
                <h2 class="font-bold mb-4">2. Verifieer & Bereken</h2>
                <div id="verificationList" class="space-y-4 mb-4"></div>
                <button onclick="generateEmailDraft()" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl shadow-md">Bereken & Genereer Mail</button>
            </div>
        </div>
        <div class="w-full lg:w-7/12 flex flex-col">
            <div id="outputContentContainer" class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 hidden">
                <div id="emailEditor" contenteditable="true" class="text-sm leading-relaxed text-slate-800 space-y-4 focus:outline-none min-h-[300px]"></div>
            </div>
            <div id="outputLoader" class="hidden flex items-center justify-center p-20 text-slate-400">
                <div class="flex flex-col items-center">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
                    <span id="loaderMessage">Bezig met zoeken...</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        let appConfig = { apiKey: '', model: 'gemini-1.5-flash-latest' };

        window.onload = function() {
            const saved = localStorage.getItem('smartquote_config');
            if(saved) {
                appConfig = JSON.parse(saved);
                document.getElementById('customApiKeyInput').value = appConfig.apiKey;
            }
        };

        function toggleSettingsModal() { document.getElementById('settingsModal').classList.toggle('hidden'); }
        function saveSettings() { 
            appConfig.apiKey = document.getElementById('customApiKeyInput').value.trim();
            localStorage.setItem('smartquote_config', JSON.stringify(appConfig));
            toggleSettingsModal();
        }

        async function performLiveSearch() {
            const query = document.getElementById('smartphoneSearchQuery').value.trim();
            if (!query) return;

            document.getElementById('searchButton').disabled = true;
            document.getElementById('outputLoader').classList.remove('hidden');
            document.getElementById('loaderMessage').innerText = "Verbinding maken met AI...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${appConfig.model}:generateContent?key=${appConfig.apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Zoek op Coolblue naar ${query}. Output format: JSON array [ { "model": "...", "color": "...", "storage": "...", "priceInclVat": 0, "originalAdvicePrice": 0, "isAction": false, "sourceUrl": "..." } ]. NEGEER Tweedekans.` }] }],
                        tools: [{ googleSearch: {} }]
                    })
                });
                
                const data = await response.json();
                
                // CRUCIAL: Defensieve check op de API response
                if (!data.candidates || !data.candidates[0] || !data.candidates[0].content || !data.candidates[0].content.parts[0].text) {
                    throw new Error(data.error?.message || "Geen bruikbare data van de AI ontvangen.");
                }

                const jsonText = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
                renderVerificationScreen(JSON.parse(jsonText));
            } catch (err) {
                console.error(err);
                document.getElementById('loaderMessage').innerText = "Fout: " + err.message;
                setTimeout(() => document.getElementById('outputLoader').classList.add('hidden'), 3000);
            } finally {
                document.getElementById('searchButton').disabled = false;
            }
        }

        function renderVerificationScreen(toestellen) {
            const list = document.getElementById('verificationList');
            list.innerHTML = toestellen.map((t, i) => `
                <div class="p-3 border rounded-lg bg-slate-50">
                    <p class="font-bold text-sm">${t.model}</p>
                    <input type="number" id="price_${i}" value="${t.priceInclVat}" class="w-full border p-1 rounded text-xs">
                </div>
            `).join('');
            document.getElementById('verificationContainer').classList.remove('hidden');
            document.getElementById('outputLoader').classList.add('hidden');
        }

        async function generateEmailDraft() {
            document.getElementById('outputContentContainer').classList.remove('hidden');
            document.getElementById('emailEditor').innerHTML = "Offerte concept gegenereerd...";
        }
    </script>
</body>
</html>
